apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aipm-secrets
  namespace: aipm
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: aipm-secrets
    creationPolicy: Owner
  data:
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: secret/apps/bifrost/config
        property: gemini_api_key
    - secretKey: SUPABASE_SERVICE_ROLE_KEY
      remoteRef:
        key: supabase/service-key
        property: value
